repos:
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-vet
        name: go vet (Mage)
        entry: go vet -tags mage ./...
        language: system
        types: [go]
        pass_filenames: false
      - id: go-imports
      - id: go-cyclo
        args: [-over=15]
        exclude: "(_test\\.go$)|(^vendor/)|(^third_party/)"
      - id: no-go-testing
      - id: golangci-lint
      - id: go-critic
        #protobuf oneof type switch triggers false positives, point repository_test due to redundant type assertion required for testing bson.M filter
        exclude: internal/sparkplugb/parse_metric.go|pkg/point/repository_test.go|^vendor/|^third_party/
      - id: go-unit-tests
      - id: go-build
      - id: go-mod-tidy
